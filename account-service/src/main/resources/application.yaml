spring:
  application:
    name: account-service
  datasource:
    url: jdbc:mysql://localhost:3306/digital-wallet
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernates:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ipi-address: true

server:
  port: 8081