<svg width="900" height="620" viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0f6e56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="900" height="620" fill="#ffffff"/>

  <!-- Eureka -->
  <rect x="360" y="24" width="180" height="56" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="450" y="48" text-anchor="middle" font-size="15" font-weight="600" fill="#2C2C2A">Eureka Server</text>
  <text x="450" y="66" text-anchor="middle" font-size="12" fill="#5F5E5A">service discovery · :8761</text>

  <line x1="450" y1="80" x2="450" y2="112" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- API Gateway -->
  <rect x="345" y="112" width="210" height="56" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="450" y="136" text-anchor="middle" font-size="15" font-weight="600" fill="#26215C">API Gateway</text>
  <text x="450" y="154" text-anchor="middle" font-size="12" fill="#3C3489">single entry point · :8080</text>

  <text x="450" y="192" text-anchor="middle" font-size="11" fill="#888780">clients call this — everything routes from here</text>

  <!-- Fan-out lines from gateway -->
  <path d="M345 140 L150 140 L150 216" fill="none" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M450 168 L450 216" fill="none" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M555 140 L750 140 L750 216" fill="none" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Account Service -->
  <rect x="60" y="216" width="180" height="66" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="150" y="242" text-anchor="middle" font-size="15" font-weight="600" fill="#04342C">Account Service</text>
  <text x="150" y="260" text-anchor="middle" font-size="12" fill="#085041">balance · auth · :8081</text>

  <!-- Transaction Service -->
  <rect x="360" y="216" width="180" height="66" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="450" y="242" text-anchor="middle" font-size="15" font-weight="600" fill="#04342C">Transaction Service</text>
  <text x="450" y="260" text-anchor="middle" font-size="12" fill="#085041">saga · idempotency · :8082</text>

  <!-- Ledger Service -->
  <rect x="660" y="216" width="180" height="66" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="750" y="242" text-anchor="middle" font-size="15" font-weight="600" fill="#04342C">Ledger Service</text>
  <text x="750" y="260" text-anchor="middle" font-size="12" fill="#085041">double-entry ledger · :8083</text>

  <!-- Feign between Account and Transaction -->
  <path d="M240 249 L360 249" fill="none" stroke="#0F6E56" stroke-width="1.3" marker-end="url(#arrow-teal)"/>
  <path d="M360 259 L240 259" fill="none" stroke="#0F6E56" stroke-width="1.3" marker-start="url(#arrow-teal)"/>
  <text x="300" y="238" text-anchor="middle" font-size="11" fill="#0F6E56" font-weight="600">Feign (sync)</text>

  <!-- Down to Kafka -->
  <line x1="150" y1="282" x2="150" y2="330" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="450" y1="282" x2="450" y2="330" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="750" y1="282" x2="750" y2="330" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Kafka -->
  <rect x="330" y="330" width="240" height="60" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="450" y="356" text-anchor="middle" font-size="15" font-weight="600" fill="#4A1B0C">Apache Kafka</text>
  <text x="450" y="374" text-anchor="middle" font-size="12" fill="#712B13">event choreography (async)</text>

  <line x1="150" y1="330" x2="150" y2="390" stroke="#5F5E5A" stroke-width="1"/>
  <path d="M150 390 L330 360" fill="none" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="750" y1="330" x2="750" y2="390" stroke="#5F5E5A" stroke-width="1"/>
  <path d="M750 390 L570 360" fill="none" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Down to DBs -->
  <line x1="150" y1="282" x2="150" y2="460" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="450" y1="390" x2="450" y2="460" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
  <line x1="150" y1="460" x2="150" y2="460" stroke="#B4B2A9" stroke-width="1"/>
  <path d="M150 282 L150 460" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
  <path d="M750 282 L750 460" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow)"/>

  <!-- DBs -->
  <rect x="60" y="460" width="180" height="50" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="150" y="490" text-anchor="middle" font-size="13" fill="#2C2C2A">MySQL: account_db</text>

  <rect x="360" y="460" width="180" height="50" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="450" y="490" text-anchor="middle" font-size="13" fill="#2C2C2A">MySQL: transaction_db</text>

  <rect x="660" y="460" width="180" height="50" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="750" y="490" text-anchor="middle" font-size="13" fill="#2C2C2A">MySQL: ledger_db</text>

  <!-- Legend -->
  <rect x="60" y="545" width="16" height="16" rx="3" fill="#E1F5EE" stroke="#0F6E56"/>
  <text x="84" y="558" font-size="12" fill="#444441">Backend service</text>

  <rect x="220" y="545" width="16" height="16" rx="3" fill="#EEEDFE" stroke="#534AB7"/>
  <text x="244" y="558" font-size="12" fill="#444441">Routing / discovery</text>

  <rect x="410" y="545" width="16" height="16" rx="3" fill="#FAECE7" stroke="#993C1D"/>
  <text x="434" y="558" font-size="12" fill="#444441">Messaging</text>

  <rect x="540" y="545" width="16" height="16" rx="3" fill="#F1EFE8" stroke="#888780"/>
  <text x="564" y="558" font-size="12" fill="#444441">Persistence</text>

  <text x="450" y="600" text-anchor="middle" font-size="12" fill="#888780">Each service owns its own database — no shared schema. Kafka drives the choreographed transfer saga.</text>
</svg>
